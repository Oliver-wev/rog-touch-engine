name: Ultimate Clean Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Code and Build APK
      run: |
        # 1. Настройка путей Android SDK
        SDK_BUILD_TOOLS="${ANDROID_HOME}/build-tools/34.0.0"
        PLATFORM="${ANDROID_HOME}/platforms/android-34/android.jar"
        
        # 2. Создание структуры папок
        mkdir -p src/main/java/com/android/internal/hardware/rogtouchengine
        mkdir -p obj bin

        # 3. Генерация чистого AndroidManifest.xml напрямую на сервере
        cat << 'EOF' > src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.android.internal.hardware.rogtouchengine">
            <application android:allowBackup="false" android:icon="@android:drawable/sym_def_app_icon">
                <activity android:name=".MainActivity" android:theme="@android:style/Theme.NoDisplay" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 4. Генерация чистого MainActivity.java напрямую на сервере
        cat << 'EOF' > src/main/java/com/android/internal/hardware/rogtouchengine/MainActivity.java
        package com.android.internal.hardware.rogtouchengine;
        import android.app.Activity;
        import android.os.Bundle;
        import android.widget.Toast;
        import java.io.DataOutputStream;
        import java.io.IOException;

        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                try {
                    Process suProcess = Runtime.getRuntime().exec("su");
                    DataOutputStream os = new DataOutputStream(suProcess.getOutputStream());
                    os.writeBytes("setprop windowscheduling.touch_latency_boost 1\n");
                    os.writeBytes("setprop view.touch_slop 2\n");
                    os.writeBytes("setprop debug.performance.tuning 1\n");
                    os.writeBytes("exit\n");
                    os.flush();
                    os.close();
                    suProcess.waitFor();
                    Toast.makeText(this, "ROG Touch Engine: Применено!", Toast.LENGTH_SHORT).show();
                } catch (IOException | InterruptedException e) {
                    e.printStackTrace();
                }
                finish();
            }
        }
        EOF

        echo "=== Шаг 1: Компиляция ресурсов (Генерация R.java) ==="
        $SDK_BUILD_TOOLS/aapt package -f -m -J obj -M src/main/AndroidManifest.xml -I $PLATFORM

        echo "=== Шаг 2: Компиляция Java кода ==="
        javac -d obj -classpath $PLATFORM obj/com/android/internal/hardware/rogtouchengine/R.java src/main/java/com/android/internal/hardware/rogtouchengine/MainActivity.java

        echo "=== Шаг 3: Перевод классов в DEX байт-код ==="
        $SDK_BUILD_TOOLS/d8 --output bin/ obj/com/android/internal/hardware/rogtouchengine/*.class

        echo "=== Шаг 4: Упаковка финального APK ==="
        $SDK_BUILD_TOOLS/aapt package -f -M src/main/AndroidManifest.xml -I $PLATFORM -F bin/rog-touch-engine.apk bin

        echo "=== Шаг 5: Выравнивание и подпись приложения ==="
        $SDK_BUILD_TOOLS/zipalign -f 4 bin/rog-touch-engine.apk app-debug.apk
        keytool -genkeypair -validity 1000 -dname "CN=Android,O=Android,C=US" -keystore keystore.jks -storepass android -keypass android -alias androidkey -keyalg RSA
        $SDK_BUILD_TOOLS/apksigner sign --ks keystore.jks --ks-pass pass:android --key-pass pass:android --out app-debug.apk app-debug.apk

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: ROG-Touch-Engine-APK
        path: app-debug.apk
        
