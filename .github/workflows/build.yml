name: Pure Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Minimal Project Config
      run: |
        # Автоматически создаем файлы окружения, чтобы компилятор не паниковал
        echo "pluginManagement { repositories { google(); mavenCentral() } }" > settings.gradle
        echo "rootProject.name = 'rog-touch-engine'" >> settings.gradle
        
        echo "android.useAndroidX=true" > gradle.properties
        
        # Переносим build.gradle в правильную подпапку app/
        mkdir -p app
        if [ -f build.gradle ]; then
          mv build.gradle app/build.gradle
        fi

    - name: Setup Gradle Environment
      uses: gradle/actions/setup-gradle@v4

    - name: Force Build APK
      run: |
        # Скачиваем официальный инструмент сборки напрямую
        gradle init --type basic --dsl groovy --incubating
        gradle wrapper --gradle-version 8.4
        chmod +x gradlew
        ./gradlew :app:assembleDebug --stacktrace
      continue-on-error: true

    - name: Extract and Upload Target APK
      uses: actions/upload-artifact@v4
      with:
        name: ROG-Touch-Engine-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
