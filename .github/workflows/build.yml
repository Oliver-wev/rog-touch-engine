name: Fixed Direct Android SDK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Auto-Fix Paths and Build APK
      run: |
        # 1. Задаем пути к утилитам Android SDK
        SDK_BUILD_TOOLS="${ANDROID_HOME}/build-tools/34.0.0"
        PLATFORM="${ANDROID_HOME}/platforms/android-34/android.jar"
        
        # 2. Создаем чистую целевую структуру папок
        mkdir -p src/main/java/com/android/internal/hardware/rogtouchengine
        mkdir -p obj bin

        # 3. Находим файлы пользователя и копируем в правильные места
        MANIFEST_PATH=$(find . -name "AndroidManifest.xml" -not -path "*/src/main/*" | head -n 1)
        if [ -z "$MANIFEST_PATH" ]; then
          MANIFEST_PATH=$(find . -name "AndroidManifest.xml" | head -n 1)
        fi
        cp "$MANIFEST_PATH" src/main/AndroidManifest.xml

        JAVA_PATH=$(find . -name "MainActivity.java" -not -path "*/src/main/*" | head -n 1)
        if [ -z "$JAVA_PATH" ]; then
          JAVA_PATH=$(find . -name "MainActivity.java" | head -n 1)
        fi
        cp "$JAVA_PATH" src/main/java/com/android/internal/hardware/rogtouchengine/MainActivity.java

        echo "=== Шаг 1: Компиляция ресурсов ==="
        $SDK_BUILD_TOOLS/aapt package -f -m -J obj -M src/main/AndroidManifest.xml -I $PLATFORM

        echo "=== Шаг 2: Компиляция Java кода ==="
        # Добавили автоматический поиск сгенерированного R.java, чтобы javac его не терял
        R_FILE=$(find obj -name "R.java")
        javac -d obj -classpath $PLATFORM "$R_FILE" src/main/java/com/android/internal/hardware/rogtouchengine/MainActivity.java

        echo "=== Шаг 3: Перевод в DEX ==="
        # Собираем все скомпилированные классы из папки obj
        find obj -name "*.class" > classes.txt
        $SDK_BUILD_TOOLS/d8 --output bin/ $(cat classes.txt)

        echo "=== Шаг 4: Упаковка APK ==="
        $SDK_BUILD_TOOLS/aapt package -f -M src/main/AndroidManifest.xml -I $PLATFORM -F bin/rog-touch-engine.apk bin

        echo "=== Шаг 5: Выравнивание и подпись ==="
        $SDK_BUILD_TOOLS/zipalign -f 4 bin/rog-touch-engine.apk app-debug.apk
        keytool -genkeypair -validity 1000 -dname "CN=Android,O=Android,C=US" -keystore keystore.jks -storepass android -keypass android -alias androidkey -keyalg RSA
        $SDK_BUILD_TOOLS/apksigner sign --ks keystore.jks --ks-pass pass:android --key-pass pass:android --out app-debug.apk app-debug.apk

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: ROG-Touch-Engine-APK
        path: app-debug.apk
